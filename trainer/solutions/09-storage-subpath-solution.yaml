apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: mon-namespace
data:
  nginx.conf: "server { listen 8080; }"
---
apiVersion: v1
kind: Pod
metadata:
  name: nginx-custom
  namespace: mon-namespace
spec:
  containers:
  - name: nginx
    image: nginx:1.29.4
    volumeMounts:
    - name: config-volume
      mountPath: /etc/nginx/conf.d/custom.conf
      subPath: nginx.conf
  volumes:
  - name: config-volume
    configMap:
      name: nginx-config
